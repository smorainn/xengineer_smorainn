<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FluenZ - AI 口语自修室</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #051e18;
      /* 彻底修复：使用舒适纯正的暗绿色背景，绝不泛蓝 */
    }

    .status-dot {
      animation: pulse-green 2s ease-in-out infinite;
    }

    @keyframes pulse-green {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .nav-back-btn {
      transition: all 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .nav-back-btn:hover {
      padding-left: 16px;
      color: #fff !important;
    }

    #coze-chat-container {
      min-height: 100vh !important;
      background-color: #ffffff;
    }

    #coze-chat-container>div,
    #coze-chat-container>iframe {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
      padding: 0 !important;
    }
  </style>
</head>

<body class="h-screen overflow-hidden">
  <div class="flex h-screen">
    <div class="w-[20%] bg-[#0e3a2f] flex flex-col shadow-2xl z-10 border-r border-white/5">
      <div class="p-6 border-b border-white/10">
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center shadow-lg shadow-emerald-900/50">
            <span class="text-white font-bold text-sm">FZ</span>
          </div>
          <div>
            <h1 class="text-white font-semibold text-lg tracking-wide">FluenZ</h1>
            <p class="text-white/40 text-xs">AI 口语自修室</p>
          </div>
        </div>
      </div>

      <div class="p-6 border-b border-white/10">
        <div class="flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10">
          <span class="w-2 h-2 rounded-full bg-emerald-400 status-dot"></span>
          <span class="text-emerald-300 text-sm font-medium">场景训练中</span>
        </div>
      </div>

      <div class="flex-1 p-6 overflow-y-auto">
        <div class="mb-6">
          <h2 class="text-white/90 font-semibold text-base mb-5 flex items-center gap-2">
            <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            使用指南
          </h2>

          <div class="space-y-5">
            <div class="p-4 rounded-xl bg-white/5 border border-white/5">
              <div class="flex items-center gap-3 mb-3">
                <div class="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center">
                  <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3zm0 18a5 5 0 01-5-5v-1a5 5 0 0110 0v1a5 5 0 01-5 5z"></path>
                  </svg>
                </div>
                <div>
                  <p class="text-white font-medium text-sm">语音输入</p>
                  <p class="text-white/50 text-xs">点击语音图标切换语音输入模式</p>
                </div>
              </div>
            </div>

            <div class="p-4 rounded-xl bg-white/5 border border-white/5">
              <div class="flex items-center gap-3 mb-3">
                <div class="w-10 h-10 rounded-lg bg-blue-500/20 flex items-center justify-center">
                  <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                  </svg>
                </div>
                <div>
                  <p class="text-white font-medium text-sm">语音通话</p>
                  <p class="text-white/50 text-xs">点击电话图标进行语音通话</p>
                </div>
              </div>
            </div>

            <div class="p-4 rounded-xl bg-white/5 border border-white/5">
              <div class="flex items-center gap-3 mb-3">
                <div class="w-10 h-10 rounded-lg bg-orange-500/20 flex items-center justify-center">
                  <svg class="w-5 h-5 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                  </svg>
                </div>
                <div>
                  <p class="text-white font-medium text-sm">结束练习</p>
                  <p class="text-white/50 text-xs">发送「结束练习」停止当前对话</p>
                </div>
              </div>
            </div>

            <div class="p-4 rounded-xl bg-white/5 border border-white/5">
              <div class="flex items-center gap-3 mb-3">
                <div class="w-10 h-10 rounded-lg bg-purple-500/20 flex items-center justify-center">
                  <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                  </svg>
                </div>
                <div>
                  <p class="text-white font-medium text-sm">生成报告</p>
                  <p class="text-white/50 text-xs">发送「结束练习」生成练习复盘报告</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="p-6 border-t border-white/10 bg-black/5">
        <a href="index.html"
          class="nav-back-btn flex items-center gap-2 text-white/50 hover:text-white text-sm font-medium transition-all duration-300">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
            </path>
          </svg>
          <span>返回首页</span>
        </a>
      </div>
    </div>

    <div class="w-[80%] bg-white p-0 m-0 relative">
      <div id="coze-chat-container" class="absolute inset-0 w-full h-full"></div>
    </div>
  </div>

  <script>
    window.addEventListener('load', () => {
      const container = document.getElementById('coze-chat-container');

      const cozeClient = new CozeWebSDK.WebChatClient({
        config: {
          bot_id: '7647830537058615302',
        },
        componentProps: {
          title: 'FluenZ AI 口语自修室',
          width: 1200,
          lang: 'zh-CN',
        },
        ui: {
          base: { layout: 'pc' },
          asstBtn: { isNeed: false },
          header: { isNeedClose: false },
          footer: { isShow: false },
          conversations: { isNeed: true },
          chatBot: {
            asDrawer: true,
            inline: true,
            target: container,
            isNeedQuote: true,
          }
        },
        auth: {
          type: 'token',
          token: 'pat_vWcJgnwb3lejf2TwfNgGBgMJlPMW3DTu22VhO9nF3VVtpLAwnYYCh5bgrRFWWOk3',
          onRefreshToken: function () {
            return 'pat_vWcJgnwb3lejf2TwfNgGBgMJlPMW3DTu22VhO9nF3VVtpLAwnYYCh5bgrRFWWOk3';
          }
        },
      });

      setTimeout(() => {
        if (typeof cozeClient.showChatBot === 'function') {
          cozeClient.showChatBot();
        }
      }, 500);
    });
  </script>
</body>

</html>
